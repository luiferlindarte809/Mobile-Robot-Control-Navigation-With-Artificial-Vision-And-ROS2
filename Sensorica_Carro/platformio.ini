; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3_idf_Sens_Car]
platform = espressif32 @ 6.9.0
board = esp32-s3-devkitm-1
framework = espidf

upload_protocol = esptool
upload_speed = 250000
monitor_speed = 250000
monitor_filters = esp32_exception_decoder, time

; --- FLASH 4MB ---
board_build.flash_size = 4MB 
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = partitions/no_ota_4mb.csv

build_flags =
  -DCONFIG_ESPTOOLPY_FLASHSIZE_4MB=1
  -DCONFIG_ESPTOOLPY_FLASHSIZE_8MB=0
  -DCONFIG_ESP_COREDUMP_ENABLE_TO_FLASH=0
  -DCONFIG_ESP_COREDUMP_ENABLE=0